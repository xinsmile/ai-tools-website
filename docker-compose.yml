services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: aibox-backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - CORS_ORIGIN=http://localhost:8080
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: aibox-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
